<html lang="ru">

    <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}">
</head>
<body>

        <img src="{% static 'images/image1488.png' %}" alt="Логотип" width="100">

        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Мой менеджер задач</p>
    </footer>

</html>
